<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
  <title id="title">Windows silky patch flow</title>
  <desc id="desc">A workflow diagram showing audit, manifest, encoding gate, release preflight, and reusable AgentWorkOS assets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="250" x2="1020" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.45" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1100" height="500" rx="36" fill="url(#bg)"/>
  <rect x="64" y="60" width="972" height="380" rx="30" fill="#ffffff" filter="url(#shadow)"/>
  <path d="M185 253h730" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <g fill="#ffffff" stroke-width="6" stroke="#0f766e">
    <circle cx="185" cy="253" r="54"/>
    <circle cx="365" cy="253" r="54"/>
    <circle cx="550" cy="253" r="54"/>
    <circle cx="735" cy="253" r="54"/>
    <circle cx="915" cy="253" r="54"/>
  </g>
  <g fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="185" y="246" font-size="24" font-weight="700">Audit</text>
    <text x="185" y="276" font-size="16">report first</text>
    <text x="365" y="246" font-size="24" font-weight="700">Manifest</text>
    <text x="365" y="276" font-size="16">hash + proof</text>
    <text x="550" y="246" font-size="24" font-weight="700">Encoding</text>
    <text x="550" y="276" font-size="16">block mojibake</text>
    <text x="735" y="246" font-size="24" font-weight="700">Preflight</text>
    <text x="735" y="276" font-size="16">release gate</text>
    <text x="915" y="246" font-size="24" font-weight="700">Assets</text>
    <text x="915" y="276" font-size="16">skill/rule/SOP</text>
  </g>
  <g fill="#334155" font-family="Segoe UI, Arial, sans-serif">
    <text x="86" y="118" font-size="30" font-weight="700">Windows workbench trust loop</text>
    <text x="86" y="158" font-size="19">Turn clutter into evidence, evidence into gates, and repeated gates into reusable patches.</text>
    <text x="86" y="392" font-size="18">No destructive default actions. No mystery artifacts. No release without proof.</text>
  </g>
</svg>
